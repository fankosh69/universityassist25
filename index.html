    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/ubuntu/v20/4iCs6KVjbNBYlgoKfw72.woff2" type="font/woff2" crossorigin>
    
    <!-- Preload LCP hero images for immediate discovery -->
    <link rel="preload" as="image" href="/src/assets/hero-image-optimized.jpg" fetchpriority="high">
    <link rel="preload" as="image" href="/src/assets/hero-image-small.jpg" media="(max-width: 1024px)" fetchpriority="high">
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Preload main JavaScript bundle for faster execution -->
    <link rel="modulepreload" href="/src/main.tsx">
    
    <!-- Load fonts with optimized display strategy for zero layout shift -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Critical CSS for zero layout shift -->
    <style>
      /* Prevent flash of unstyled content and layout shifts */
      #root { 
        min-height: 100vh; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(135deg, hsl(231 87% 58%), hsl(184 58% 59%));
        contain: layout style;
      }
      
      /* Loading indicator for immediate FCP */
      .loading-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 18px;
        font-weight: 500;
        z-index: 1000;
        opacity: 1;
        transition: opacity 0.3s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      
      /* Critical hero section styles for immediate LCP with reserved space */
      .hero-section {
        position: relative;
        background: linear-gradient(135deg, hsl(231 87% 58%), hsl(184 58% 59%));
        overflow: hidden;
        min-height: 100vh;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        contain: layout style;
      }
      
      .hero-content {
        position: relative;
        text-align: center;
        color: white;
        padding: 2rem;
        max-width: 1200px;
        width: 100%;
        contain: layout style;
      }
      
      .hero-title {
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 700;
        margin-bottom: 1.5rem;
        line-height: 1.1;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-synthesis: none;
        text-rendering: optimizeSpeed;
        height: auto;
        min-height: clamp(2.75rem, 6.6vw, 4.4rem);
      }
      
      /* Hide loading indicator once app loads */
      .app-loaded .loading-indicator {
        opacity: 0;
        pointer-events: none;
      }
      
      /* Optimized font loading to prevent layout shifts */
      @font-face {
        font-family: 'PoppinsFallback';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: local('Arial'), local('Helvetica Neue'), local('Helvetica'), local(sans-serif);
        ascent-override: 105%;
        descent-override: 35%;
        line-gap-override: 10%;
        size-adjust: 107%;
      }
      
      @font-face {
        font-family: 'UbuntuFallback'; 
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: local('Arial'), local('Helvetica Neue'), local('Helvetica'), local(sans-serif);
        ascent-override: 100%;
        descent-override: 25%;
        line-gap-override: 0%;
        size-adjust: 95%;
      }
      
      /* Font family with proper fallbacks to prevent shifts */
      .font-heading-safe {
        font-family: 'Poppins', 'PoppinsFallback', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      
      .font-body-safe {
        font-family: 'Ubuntu', 'UbuntuFallback', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
    </style>
  </head>

  <body>
    <!-- Immediate content for FCP and LCP optimization -->
    <div class="loading-indicator">
      University Assist
    </div>
    
    <!-- Critical above-the-fold content for LCP -->
    <div class="hero-section" style="display: none;">
      <!-- Inline placeholder hero image for immediate LCP -->
      <div style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, hsl(231 87% 58%), hsl(184 58% 59%));
        opacity: 0.8;
      "></div>
      <div class="hero-content">
        <h1 class="hero-title">Find Your Path to German Universities</h1>
        <p style="font-size: 1.25rem; margin-bottom: 2rem; opacity: 0.9;">
          Your way to Germany - Discover 400+ German university programs
        </p>
        <!-- Inline placeholder buttons for better LCP -->
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
          <div style="
            background: white;
            color: hsl(231 87% 58%);
            padding: 0.875rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.125rem;
            min-width: 12rem;
            text-align: center;
          ">
            Start Your Journey
          </div>
          <div style="
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.875rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.125rem;
            min-width: 12rem;
            text-align: center;
          ">
            Browse Programs
          </div>
        </div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide loading indicator and show hero content for better LCP
      const heroSection = document.querySelector('.hero-section');
      let appLoaded = false;
      
      // Show critical content immediately for better LCP
      setTimeout(() => {
        if (!appLoaded) {
          document.querySelector('.loading-indicator').style.display = 'none';
          heroSection.style.display = 'flex';
        }
      }, 100);
      
      // Hide fallback content once React starts rendering
      const observer = new MutationObserver(() => {
        if (document.getElementById('root').children.length > 0) {
          appLoaded = true;
          document.body.classList.add('app-loaded');
          heroSection.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
