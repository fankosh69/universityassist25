<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Assist API Documentation</title>
  <meta name="description" content="Complete API documentation for University Assist platform - your way to German universities">
  
  <!-- Redoc CSS -->
  <style>
    body { margin: 0; padding: 0; }
    redoc { display: block; }
  </style>
</head>
<body>
  
  <!-- Redoc container -->
  <div id="redoc-container"></div>
  
  <!-- Redoc script -->
  <script src="https://cdn.redoc.ly/redoc/v2.0.0/bundles/redoc.standalone.js"></script>
  <script>
    Redoc.init('/api/openapi.json', {
      scrollYOffset: 60,
      hideDownloadButton: false,
      theme: {
        colors: {
          primary: {
            main: '#2E57F6'
          },
          success: {
            main: '#63D581'  
          }
        },
        typography: {
          fontFamily: 'Ubuntu, system-ui, sans-serif',
          headings: {
            fontFamily: 'Poppins, system-ui, sans-serif'
          }
        },
        sidebar: {
          backgroundColor: '#F5F7FA',
          textColor: '#2c3e50'
        },
        rightPanel: {
          backgroundColor: '#1e293b'
        }
      },
      expandResponses: '200,201',
      jsonSampleExpandLevel: 2,
      hideHostname: false,
      pathInMiddlePanel: true,
      menuToggle: true,
      search: true,
      sortPropsAlphabetically: true,
      payloadSampleIdx: 0
    }, document.getElementById('redoc-container'));
  </script>
  
</body>
</html>
