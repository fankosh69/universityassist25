<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node { fill: #e1f5fe; stroke: #2E57F6; stroke-width: 2; }
      .decision { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
      .process { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2; }
      .final { fill: #e8f5e8; stroke: #4caf50; stroke-width: 2; }
      .text { font-family: 'Ubuntu', sans-serif; font-size: 10px; fill: #333; text-anchor: middle; }
      .link { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-size: 9px; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- Start -->
  <rect x="20" y="80" width="100" height="50" class="node" rx="5"/>
  <text x="70" y="100" class="text">Student logs in</text>
  <text x="70" y="112" class="text">from Germany</text>
  
  <!-- Country Detection -->
  <polygon points="180,85 230,110 180,135 130,110" class="decision"/>
  <text x="180" y="110" class="text">Country=DE?</text>
  
  <!-- Yes Path -->
  <rect x="270" y="60" width="110" height="50" class="process" rx="5"/>
  <text x="325" y="80" class="text">Send Ambassador Invite</text>
  <text x="325" y="92" class="text">Email/WhatsApp</text>
  
  <rect x="420" y="60" width="110" height="50" class="process" rx="5"/>
  <text x="475" y="75" class="text">Consent Form:</text>
  <text x="475" y="87" class="text">name display + LinkedIn</text>
  <text x="475" y="99" class="text">+ testimonial + video</text>
  
  <rect x="570" y="60" width="110" height="50" class="process" rx="5"/>
  <text x="625" y="75" class="text">Upload Content:</text>
  <text x="625" y="87" class="text">Video, Photos,</text>
  <text x="625" y="99" class="text">Testimonial</text>
  
  <!-- Review Process -->
  <rect x="720" y="60" width="100" height="50" class="process" rx="5"/>
  <text x="770" y="80" class="text">Admin review</text>
  <text x="770" y="92" class="text">& approve</text>
  
  <polygon points="880,65 930,90 880,115 830,90" class="decision"/>
  <text x="880" y="90" class="text">Approved?</text>
  
  <!-- Approved Path -->
  <rect x="970" y="40" width="110" height="50" class="final" rx="5"/>
  <text x="1025" y="55" class="text">Publish on</text>
  <text x="1025" y="67" class="text">City/University/</text>
  <text x="1025" y="79" class="text">Program pages</text>
  
  <rect x="970" y="110" width="110" height="50" class="final" rx="5"/>
  <text x="1025" y="130" class="text">Visible to</text>
  <text x="1025" y="142" class="text">prospective students</text>
  
  <rect x="970" y="180" width="110" height="50" class="final" rx="5"/>
  <text x="1025" y="200" class="text">Student</text>
  <text x="1025" y="212" class="text">Engagement</text>
  
  <!-- Rejected Path -->
  <rect x="720" y="140" width="100" height="50" class="process" rx="5"/>
  <text x="770" y="160" class="text">Feedback to</text>
  <text x="770" y="172" class="text">Ambassador</text>
  
  <!-- No Path -->
  <rect x="270" y="180" width="110" height="40" class="node" rx="5"/>
  <text x="325" y="205" class="text">Normal User Flow</text>
  
  <!-- Connection Lines -->
  <line x1="120" y1="105" x2="130" y2="110" class="link"/>
  <line x1="230" y1="95" x2="270" y2="85" class="link"/>
  <line x1="230" y1="125" x2="270" y2="200" class="link"/>
  
  <line x1="380" y1="85" x2="420" y2="85" class="link"/>
  <line x1="530" y1="85" x2="570" y2="85" class="link"/>
  <line x1="680" y1="85" x2="720" y2="85" class="link"/>
  <line x1="820" y1="85" x2="830" y2="90" class="link"/>
  
  <line x1="930" y1="75" x2="970" y2="65" class="link"/>
  <line x1="930" y1="105" x2="880" y2="130" class="link"/>
  <line x1="880" y1="130" x2="820" y2="165" class="link"/>
  <line x1="720" y1="165" x2="625" y2="110" class="link"/>
  
  <line x1="1025" y1="90" x2="1025" y2="110" class="link"/>
  <line x1="1025" y1="160" x2="1025" y2="180" class="link"/>
  
  <!-- Labels -->
  <text x="250" y="75" class="label">yes</text>
  <text x="250" y="195" class="label">no</text>
  <text x="950" y="60" class="label">yes</text>
  <text x="850" y="145" class="label">no</text>
</svg>